<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>AP Legal Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚖️</span>
          <span class="logo-text">AP Legal Tracker</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="workspace">
          <span class="nav-icon">📋</span>
          <span>Workspace</span>
        </a>
        <a href="#" class="nav-item" data-view="calendar">
          <span class="nav-icon">📅</span>
          <span>Calendar</span>
        </a>
        <a href="#" class="nav-item" data-view="display-board">
          <span class="nav-icon">📊</span>
          <span>Display Board</span>
        </a>
        <a href="#" class="nav-item" data-view="reports">
          <span class="nav-icon">📈</span>
          <span>Reports</span>
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <span class="nav-icon">⚙️</span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-icon">👤</span>
          <span class="user-name">Ravi Teja Kukkala</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content dark-theme">
      <!-- Top Header -->
      <header class="top-header">
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search Cases" class="search-input">
          <button class="filter-btn" title="Filter">
            <span>⚙️</span>
          </button>
        </div>
        <div class="header-actions">
          <button class="btn-icon" title="Notifications">🔔</button>
          <button class="btn-icon" id="refresh-btn" title="Refresh">🔄</button>
        </div>
      </header>

      <!-- Content Split View -->
      <div class="content-split">
        <!-- Cases List -->
        <div class="cases-list-panel">
          <div class="panel-header">
            <h2>My Cases</h2>
            <button class="add-btn" id="add-case-btn" title="Add New Case">
              <span>+</span>
            </button>
          </div>

          <div id="cases-list" class="cases-list">
            <!-- Cases will be rendered here -->
            <div class="empty-state">
              <p>No cases yet</p>
              <button class="btn btn-primary" id="first-case-btn">+ Add Your First Case</button>
            </div>
          </div>
        </div>

        <!-- Case Detail Panel -->
        <div class="case-detail-panel" id="case-detail-panel">
          <div class="detail-placeholder">
            <span class="placeholder-icon">📁</span>
            <p>Select a case to view details</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Search Case Modal - Mercury Lawyer Style -->
  <div id="case-modal" class="modal">
    <div class="modal-content modal-dark">
      <div class="modal-header">
        <h2 id="modal-title">ADD A NEW CASE</h2>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>

      <!-- Tabs -->
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="case-number">By Case Number</button>
        <button class="modal-tab" data-tab="party-name">By Party Name</button>
        <button class="modal-tab" data-tab="advocate">By Advocate</button>
        <button class="modal-tab" data-tab="custom">Custom Case</button>
      </div>

      <!-- By Case Number Form - Simple like Mercury Lawyer -->
      <form id="case-number-form" class="modal-form active">
        <div class="form-group">
          <label>Hearing Court</label>
          <select id="hearing-court" class="dark-select" required>
            <option value="">Select Court</option>
            <option value="High Court of Andhra Pradesh">High Court of Andhra Pradesh</option>
            <option value="Supreme Court of India">Supreme Court of India</option>
            <optgroup label="District Courts">
              <option value="District Court - Guntur">District Court - Guntur</option>
              <option value="District Court - Vijayawada">District Court - Vijayawada</option>
              <option value="District Court - Visakhapatnam">District Court - Visakhapatnam</option>
              <option value="District Court - Tirupati">District Court - Tirupati</option>
              <option value="District Court - Kurnool">District Court - Kurnool</option>
              <option value="District Court - Anantapur">District Court - Anantapur</option>
              <option value="District Court - Nellore">District Court - Nellore</option>
              <option value="District Court - Kadapa">District Court - Kadapa</option>
              <option value="District Court - Rajahmundry">District Court - Rajahmundry</option>
              <option value="District Court - Kakinada">District Court - Kakinada</option>
              <option value="District Court - Eluru">District Court - Eluru</option>
              <option value="District Court - Ongole">District Court - Ongole</option>
              <option value="District Court - Srikakulam">District Court - Srikakulam</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label>Case Type</label>
          <select id="hearing-case-type" class="dark-select" required>
            <option value="">Select Case Type</option>
            <optgroup label="High Court">
              <option value="WP">Writ Petition (WP)</option>
              <option value="WPMP">WP Misc Petition (WPMP)</option>
              <option value="CRP">Civil Revision Petition (CRP)</option>
              <option value="CMA">Civil Misc Appeal (CMA)</option>
              <option value="SA">Second Appeal (SA)</option>
              <option value="AS">Appeal Suit (AS)</option>
              <option value="CRLP">Criminal Petition (CRLP)</option>
              <option value="CRLA">Criminal Appeal (CRLA)</option>
            </optgroup>
            <optgroup label="District Court">
              <option value="OS">Original Suit (OS)</option>
              <option value="EP">Execution Petition (EP)</option>
              <option value="IA">Interlocutory Application (IA)</option>
              <option value="CC">Civil Case (CC)</option>
              <option value="MC">Misc Case (MC)</option>
              <option value="SC">Sessions Case (SC)</option>
            </optgroup>
            <optgroup label="Supreme Court">
              <option value="SLP(C)">Special Leave Petition Civil</option>
              <option value="SLP(CRL)">Special Leave Petition Criminal</option>
              <option value="CA">Civil Appeal</option>
              <option value="WP(C)">Writ Petition Civil</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label>Case Number</label>
          <input type="text" id="hearing-case-number" class="dark-input" placeholder="Enter Case Number" required>
        </div>

        <div class="form-group">
          <label>Case Year</label>
          <select id="hearing-case-year" class="dark-select" required>
          </select>
        </div>

        <button type="submit" class="submit-btn">SUBMIT</button>

        <p class="modal-help">
          Can't find your Court? <a href="#">Request it now</a>
        </p>
      </form>

      <!-- By Party Name Form -->
      <form id="party-name-form" class="modal-form">
        <div class="form-group">
          <label>Court</label>
          <select id="party-court" class="dark-select" required>
            <option value="">Select Court</option>
            <option value="High Court of Andhra Pradesh">High Court of Andhra Pradesh</option>
            <option value="Supreme Court of India">Supreme Court of India</option>
          </select>
        </div>
        <div class="form-group">
          <label>Party Name</label>
          <input type="text" id="party-name-input" class="dark-input" placeholder="Enter Party Name" required>
        </div>
        <button type="submit" class="submit-btn">SEARCH</button>
      </form>

      <!-- By Advocate Form -->
      <form id="advocate-form" class="modal-form">
        <div class="form-group">
          <label>Court</label>
          <select id="adv-court" class="dark-select" required>
            <option value="">Select Court</option>
            <option value="High Court of Andhra Pradesh">High Court of Andhra Pradesh</option>
          </select>
        </div>
        <div class="form-group">
          <label>Advocate Name</label>
          <input type="text" id="adv-name" class="dark-input" placeholder="Enter Advocate Name" required>
        </div>
        <button type="submit" class="submit-btn">SEARCH</button>
      </form>

      <!-- Custom Case Form (Manual Entry) -->
      <form id="custom-case-form" class="modal-form">
        <div class="form-row">
          <div class="form-group">
            <label>Court</label>
            <select id="case-court" class="dark-select" required>
              <option value="">Select Court</option>
              <option value="High Court of Andhra Pradesh">High Court of Andhra Pradesh</option>
              <option value="Supreme Court of India">Supreme Court of India</option>
              <optgroup label="District Courts">
                <option value="District Court - Guntur">District Court - Guntur</option>
                <option value="District Court - Vijayawada">District Court - Vijayawada</option>
                <option value="District Court - Visakhapatnam">District Court - Visakhapatnam</option>
                <option value="District Court - Tirupati">District Court - Tirupati</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label>Case Number</label>
            <input type="text" id="case-number" class="dark-input" placeholder="e.g., 12345" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Case Type</label>
            <select id="case-type" class="dark-select">
              <option value="">Select Type</option>
              <option value="WP">Writ Petition (WP)</option>
              <option value="CRP">Civil Revision Petition (CRP)</option>
              <option value="OS">Original Suit (OS)</option>
              <option value="AS">Appeal Suit (AS)</option>
              <option value="EP">Execution Petition (EP)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="number" id="case-year" class="dark-input" placeholder="2024">
          </div>
        </div>

        <div class="form-group">
          <label>Petitioner</label>
          <input type="text" id="petitioner" class="dark-input" placeholder="Petitioner name(s)" required>
        </div>

        <div class="form-group">
          <label>Respondent</label>
          <input type="text" id="respondent" class="dark-input" placeholder="Respondent name(s)" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Next Hearing</label>
            <input type="date" id="next-hearing" class="dark-input">
          </div>
          <div class="form-group">
            <label>CNR Number</label>
            <input type="text" id="cnr-number" class="dark-input" placeholder="e.g., APGU000021322020">
          </div>
        </div>

        <button type="submit" class="submit-btn">ADD CASE</button>
      </form>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loading-text">Loading...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
