name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-flight runs for the same branch when a new commit lands.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Use `npm install` rather than `npm ci` so cross-platform
        # optional deps (e.g. @emnapi/* on Linux that aren't installed
        # when the lockfile is generated on macOS) resolve cleanly.
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (errors only)
        # Pre-existing warnings in unrelated files; gate only on errors.
        run: npx eslint --max-warnings 1000 .

      - name: Unit tests
        run: npm test
